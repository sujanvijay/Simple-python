apiVersion: apps/v1
kind: Deployment
metadata:
  name: py-deply-t6
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tes-6
  template:
    metadata:
      labels:
        app: tes-6
    spec:
      containers:
      - name: py-cont-6
        image: sujanvijay/simple-python-app:v1
        ports:
        - containerPort: 5000
